services:
  ministack:
    image: ministackorg/ministack
    container_name: ministack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,rds,apigateway,sts
      - DEBUG=0
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ministack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/_localstack/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Terraform corre só no host (`make tf-apply` / `make setup`), nunca aqui dentro:
  # o mesmo diretório terraform/ no Windows e num contentor Linux partilhava .terraform
  # e um segundo apply repetia criação no Ministack (exit 1/2).

  plus-ms-auth:
    build:
      context: ../plus-ms-auth
      dockerfile: Dockerfile
    container_name: plus-ms-auth
    ports:
      - "${MS_AUTH_PORT:-3001}:3001"
    env_file:
      - ./terraform/rds.env
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ENDPOINT=http://ministack:4566
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      ministack:
        condition: service_healthy
    restart: unless-stopped

  plus-mfe-auth:
    build:
      context: ../plus-mfe-auth
      dockerfile: Dockerfile
      args:
        # O browser chama este URL. O gateway LocalStack (4566) costuma falhar em CORS com origins :3000/:4001;
        # o plus-ms-auth já permite esses origins em http://localhost:3001.
        VITE_MS_AUTH_URL: ${VITE_MS_AUTH_BROWSER:-http://localhost:3001}
    container_name: plus-mfe-auth
    ports:
      - "${MFE_AUTH_PORT:-4001}:4001"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ENDPOINT=http://ministack:4566
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:4001/assets/remoteEntry.js || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    depends_on:
      ministack:
        condition: service_healthy
    restart: unless-stopped

  plus-shell:
    build:
      context: ../plus-shell
      dockerfile: Dockerfile
      args:
        VITE_MS_AUTH_URL: ${VITE_MS_AUTH_BROWSER:-http://localhost:3001}
        MFE_AUTH_URL: ${MFE_AUTH_URL:-http://localhost:4001/assets/remoteEntry.js}
    container_name: plus-shell
    ports:
      - "${SHELL_PORT:-3000}:3000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ENDPOINT=http://ministack:4566
    depends_on:
      ministack:
        condition: service_healthy
      plus-mfe-auth:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ministack_data:
