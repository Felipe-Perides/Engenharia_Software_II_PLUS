name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          VITE_MS_AUTH_URL: http://localhost:4566/restapis/placeholder/local/_user_request_

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: plus-mfe-auth:${{ github.sha }}
          build-args: |
            VITE_MS_AUTH_URL=http://localhost:4566/restapis/placeholder/local/_user_request_
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run -d --name mfe-auth -p 4001:4001 plus-mfe-auth:${{ github.sha }}
          sleep 3
          curl -fsS http://localhost:4001/ > /dev/null
          curl -fsS http://localhost:4001/remoteEntry.js > /dev/null
          docker logs mfe-auth
          docker stop mfe-auth
